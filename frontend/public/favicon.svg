  />

  <g filter="url(#glow)">
    <line x1="256" y1="140" x2="256" y2="170" stroke="#00f0ff" stroke-width="3"/>
    <line x1="241" y1="155" x2="271" y2="155" stroke="#00f0ff" stroke-width="3"/>
    <line x1="245" y1="145" x2="267" y2="165" stroke="#00f0ff" stroke-width="2"/>
