services:
  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "${PROXY_HOST_PORT:-8085}:80"
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - raveberg

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      NODE_ENV: development
      VITE_APP_NAME: RAVEBERG
      VITE_DISPLAY_HEARTBEAT_INTERVAL_SECONDS: ${DISPLAY_HEARTBEAT_INTERVAL_SECONDS:-15}
    ports:
      - "${FRONTEND_HOST_PORT:-5180}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - raveberg

  backend:
    build:
      context: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-raveberg}:${POSTGRES_PASSWORD:-raveberg_dev}@db:5432/${POSTGRES_DB:-raveberg}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:8085,http://127.0.0.1:8085,http://localhost:5180,http://127.0.0.1:5180}
      DEFAULT_APP_MODE: ${DEFAULT_APP_MODE:-visualizer}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-15728640}
      VIDEO_UPLOAD_MAX_BYTES: ${VIDEO_UPLOAD_MAX_BYTES:-524288000}
      DEFAULT_MODERATION_MODE: ${DEFAULT_MODERATION_MODE:-auto_approve}
      DEFAULT_SLIDESHOW_ENABLED: ${DEFAULT_SLIDESHOW_ENABLED:-true}
      DEFAULT_SLIDESHOW_INTERVAL_SECONDS: ${DEFAULT_SLIDESHOW_INTERVAL_SECONDS:-6}
      DEFAULT_SLIDESHOW_SHUFFLE: ${DEFAULT_SLIDESHOW_SHUFFLE:-true}
      DEFAULT_VISUALIZER_AUTO_CYCLE_ENABLED: ${DEFAULT_VISUALIZER_AUTO_CYCLE_ENABLED:-false}
      DEFAULT_VISUALIZER_AUTO_CYCLE_INTERVAL_SECONDS: ${DEFAULT_VISUALIZER_AUTO_CYCLE_INTERVAL_SECONDS:-45}
      UPLOAD_RATE_LIMIT_COUNT: ${UPLOAD_RATE_LIMIT_COUNT:-8}
      UPLOAD_RATE_LIMIT_WINDOW_SECONDS: ${UPLOAD_RATE_LIMIT_WINDOW_SECONDS:-60}
      MAX_STORED_UPLOADS: ${MAX_STORED_UPLOADS:-400}
      CLEANUP_PRESERVE_LATEST_COUNT: ${CLEANUP_PRESERVE_LATEST_COUNT:-120}
      CLEANUP_BATCH_SIZE: ${CLEANUP_BATCH_SIZE:-50}
      DISPLAY_HEARTBEAT_INTERVAL_SECONDS: ${DISPLAY_HEARTBEAT_INTERVAL_SECONDS:-15}
      DISPLAY_HEARTBEAT_STALE_SECONDS: ${DISPLAY_HEARTBEAT_STALE_SECONDS:-40}
      APPLIANCE_MODE: ${APPLIANCE_MODE:-false}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8085}
      GUEST_UPLOAD_PATH: ${GUEST_UPLOAD_PATH:-/guest/upload}
      ADMIN_PATH: ${ADMIN_PATH:-/admin/login}
      DISPLAY_PATH: ${DISPLAY_PATH:-/display}
      KIOSK_START_URL: ${KIOSK_START_URL:-http://localhost:8085/display}
      EVENT_NAME: ${EVENT_NAME:-RAVEBERG}
      AP_ENABLED: ${AP_ENABLED:-false}
      AP_SSID: ${AP_SSID:-RAVEBERG}
      AP_ADDRESS: ${AP_ADDRESS:-10.77.0.1}
      LOCAL_HOSTNAME: ${LOCAL_HOSTNAME:-raveberg.local}
      WIFI_INTERFACE: ${WIFI_INTERFACE:-wlan0}
      APP_DATA_PATH: ${APP_DATA_PATH:-/app/data}
      UPLOADS_PATH: ${UPLOADS_PATH:-/app/data/uploads}
      DISPLAY_CACHE_PATH: ${DISPLAY_CACHE_PATH:-/app/data/display-cache}
    ports:
      - "${BACKEND_HOST_PORT:-8050}:8000"
    volumes:
      - ./backend:/app
      - app_data:/app/data
      - upload_data:/app/data/uploads
      - display_cache:/app/data/display-cache
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
    depends_on:
      db:
        condition: service_healthy
    networks:
      - raveberg

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-raveberg}
      POSTGRES_USER: ${POSTGRES_USER:-raveberg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-raveberg_dev}
    ports:
      - "${POSTGRES_HOST_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raveberg} -d ${POSTGRES_DB:-raveberg}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - raveberg

networks:
  raveberg:
    driver: bridge

volumes:
  postgres_data:
  app_data:
  upload_data:
  display_cache:
  frontend_node_modules:
